<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-image:url("loginback.jpg");
      background-size: cover;
      margin: 0;
      padding: 0;
    }

    .logo {
      margin: 30px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .logo span {
      border-bottom: 2px solid black;
    }

    body, html {
      height: 100%;
    }

    .container {
       display: flex;
       justify-content: center;
       align-items: center;
       height: 100vh; /* Full height of viewport */
       padding: 20px; /* For mobile spacing */
    }


    .form-box {
      background-color: #fff;
      background:rgba(243, 241, 241, 0.5);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 28px;
    }

    .form-box p.subtext {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    .form-box input[type="text"],
    .form-box input[type="email"],
    .form-box input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #fefefe;
      outline: none;
    }

    .form-box button.signup {
      width: 100%;
      padding: 12px;
      background-color: #0056b3;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .form-box button.signup:hover {
      background-color: white;
      color:black;
    }

    .form-box .checkbox {
      display: flex;
      align-items: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .form-box .checkbox input {
      margin-right: 8px;
    }

    .divider {
      text-align: center;
      margin: 30px 0 20px;
      position: relative;
      font-size: 13px;
      color: #888;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ccc;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .divider span {
      background:rgba(243, 241, 241, 0.5);
      padding: 0 10px;
      position: relative;
      z-index: 1;
    }

    .social-buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .signup-button{
      width: 100%;
      padding: 10px;
      background-color:#0056b3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .signup-button:hover {
       background-color:white;
       color:black;
    }

    .social-buttons button {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s ease-in-out;
    }

    .social-buttons button:hover {
      background-color: #f0f0f0;
    }

    .signin-text {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
    }

    .signin-text a {
      color: #1976d2;
      text-decoration: none;
    }

    .signin-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>



  <div class="container">
    <div class="form-box">
      <h2>Sign up</h2>
      <p class="subtext">Sign up to continue</p>

      <form>
        <input type="text" placeholder="Name" required />
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit" class="signup-button">Sign up</button>

        <div class="checkbox">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
        </div>

        <div class="divider"><span>ACCESS QUICKLY</span></div>

        <div class="social-buttons">
          <button>Google</button>
          <button>LinkedIn</button>
          <button>SSO</button>
        </div>
      </form>

      <div class="signin-text">
        Already have an account? <a href="index.html">login</a>
      </div>
    </div>
  </div>

</body>
</html>
