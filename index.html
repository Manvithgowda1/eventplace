<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link href="login.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: url("loginback.jpg");
      background-size: cover;
    }
    .login-container {
      background: rgba(243, 241, 241, 0.5);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
      width: 300px;
      color: rgb(66, 63, 63);
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 94%;
      padding: 8px;
      border: 1px solid rgba(247, 245, 245, 0.7);
      border-radius: 4px;
    }
    .login-button {
      width: 100%;
      padding: 10px;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .login-button:hover {
      background-color: white;
      color: black;
    }
    .abc {
      text-size-adjust: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form onsubmit="redirectToIndex(event)">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="login-button">Login</button>
    </form>
    <div class="abc">
      <h6>Don't have an account? <a href="signup.html"><b>Signup</b></a></h6>
    </div>
  </div>

  <script>
    function redirectToIndex(event) {
      event.preventDefault(); // prevent actual form submission
      window.location.href = "sample.html"; // redirect to index.html
    }
  </script>
</body>
</html>
